name: Deploy ECR to Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '배포 확인 ("deploy" 입력)'
        required: true
        type: string
      target:
        description: '배포 대상'
        required: true
        default: 'api'
        type: choice
        options:
          - api
          - gateway
          - all

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: angple-backend
  ECR_REGISTRY: 891376997084.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  # ── Stage 1: Build & ECR Push (auto) ──
  build:
    name: Build & Push ECR
    runs-on: ubuntu-24.04-arm
    if: inputs.confirm == 'deploy'

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        if: inputs.target == 'api' || inputs.target == 'all'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/api.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha,scope=backend-api
          cache-to: type=gha,mode=max,scope=backend-api

      - name: Build and push Gateway
        if: inputs.target == 'gateway' || inputs.target == 'all'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/gateway.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:gateway-sha-${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:gateway-latest
          cache-from: type=gha,scope=backend-gateway
          cache-to: type=gha,mode=max,scope=backend-gateway

  # ── Stage 2: Verify & Notify (auto, staging env) ──
  deploy-staging:
    name: Verify & Notify
    needs: build
    runs-on: ubuntu-24.04-arm
    environment: staging

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify API image in ECR
        if: inputs.target == 'api' || inputs.target == 'all'
        run: |
          echo "Verifying image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}"
          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=sha-${{ github.sha }} \
            --query 'imageDetails[0].{size:imageSizeInBytes,pushed:imagePushedAt,tags:imageTags}' \
            --output table
          echo "API image verified."

      - name: Verify Gateway image in ECR
        if: inputs.target == 'gateway' || inputs.target == 'all'
        run: |
          echo "Verifying image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:gateway-sha-${{ github.sha }}"
          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=gateway-sha-${{ github.sha }} \
            --query 'imageDetails[0].{size:imageSizeInBytes,pushed:imagePushedAt,tags:imageTags}' \
            --output table
          echo "Gateway image verified."

      - name: Notify build complete + request approval (Telegram)
        if: success()
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          MSG="✅ 백엔드 빌드 완료 (${{ inputs.target }})

          커밋: ${SHORT_SHA} - ${COMMIT_MSG}
          이미지: angple-backend:sha-${SHORT_SHA}

          ECR 이미지 검증 통과. 프로덕션 배포 승인 대기 중.
          👉 ${RUN_URL}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" >/dev/null 2>&1 || true

  # ── Stage 3: Production deploy (manual approval required) ──
  deploy-production:
    name: Production Deploy
    needs: deploy-staging
    runs-on: ubuntu-24.04-arm
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy API via SSM
        if: inputs.target == 'api' || inputs.target == 'all'
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "/home/angple/k8s/prod/deploy.sh backend '"$IMAGE_TAG"'"
            ]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          echo "Waiting for deployment..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-038a1d1f00798d94b" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-038a1d1f00798d94b" \
            --query "Status" \
            --output text)

          echo "Status: $STATUS"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-038a1d1f00798d94b" \
            --query "StandardOutputContent" \
            --output text

          if [ "$STATUS" != "Success" ]; then
            echo "Error:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

      - name: Deploy Gateway via SSM
        if: inputs.target == 'gateway' || inputs.target == 'all'
        env:
          IMAGE_TAG: gateway-sha-${{ github.sha }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "/home/angple/k8s/prod/deploy.sh gateway '"$IMAGE_TAG"'"
            ]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          echo "Waiting for deployment..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-038a1d1f00798d94b" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-038a1d1f00798d94b" \
            --query "Status" \
            --output text)

          echo "Status: $STATUS"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-038a1d1f00798d94b" \
            --query "StandardOutputContent" \
            --output text

          if [ "$STATUS" != "Success" ]; then
            echo "Error:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

      - name: Notify deploy complete (Telegram)
        if: success()
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')

          MSG="🚀 백엔드 배포 완료 (${{ inputs.target }})

          커밋: ${SHORT_SHA} - ${COMMIT_MSG}
          이미지: angple-backend:sha-${SHORT_SHA}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" >/dev/null 2>&1 || true
